name: 🚦 Performance Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-gate:
    name: Lighthouse Audit + Gate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Tools
        run: |
          npm install -g lighthouse
          # Use Python's built-in HTTP server — more reliable in CI than serve
          echo "Tools installed"

      - name: 🌐 Serve Site
        run: |
          # Python HTTP server is always available on ubuntu-latest
          python3 -m http.server 3000 &
          sleep 3
          # Confirm server works and page loads
          echo "=== Server response ==="
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" http://localhost:3000
          curl -s http://localhost:3000 | head -3

      - name: 🔦 Run Lighthouse
        run: |
          lighthouse http://localhost:3000/index.html \
            --output=json \
            --output-path=./report.json \
            --chrome-flags="--headless=new --no-sandbox --disable-gpu --disable-dev-shm-usage --disable-setuid-sandbox --ignore-certificate-errors" \
            --only-categories=performance \
            --throttling-method=provided \
            --skip-audits=uses-http2,redirects-http \
            --max-wait-for-load=45000

      - name: 🔍 Verify Report
        if: always()
        run: |
          echo "=== Workspace files ==="
          ls -la
          echo ""
          if [ -f report.json ]; then
            echo "✅ report.json EXISTS ($(wc -c < report.json) bytes)"
            node -e "
              const r = require('./report.json');
              const perf = r.categories?.performance;
              console.log('performance.score raw:', perf?.score);
              console.log('Score x100:', Math.round((perf?.score ?? 0) * 100));
              console.log('runtimeError:', r.runtimeError?.message ?? 'none');
              console.log('URL audited:', r.finalUrl ?? r.requestedUrl);
            "
          else
            echo "❌ report.json NOT FOUND"
          fi

      - name: 📎 Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report-${{ github.sha }}
          path: report.json
          retention-days: 30

      - name: 🚦 Performance Gate Check
        run: |
          node -e "
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('report.json', 'utf8'));

            // Check for runtime errors first
            if (report.runtimeError) {
              console.error('Lighthouse runtime error:', report.runtimeError.message);
              process.exit(1);
            }

            const raw = report.categories?.performance?.score;
            if (raw === null || raw === undefined) {
              console.error('Performance score is null — page may not have loaded');
              process.exit(1);
            }

            const score = Math.round(raw * 100);
            const threshold = parseInt(process.env.PERF_THRESHOLD || '80');

            console.log('');
            console.log('  =============================================');
            console.log('  LIGHTHOUSE PERFORMANCE GATE');
            console.log('  =============================================');
            console.log('  Score:     ' + score + ' / 100');
            console.log('  Threshold: ' + threshold);
            console.log('  =============================================');

            if (score < threshold) {
              console.error('  GATE FAILED - Deployment BLOCKED');
              console.error('  Score ' + score + ' is below threshold ' + threshold);
              process.exit(1);
            }
            console.log('  GATE PASSED - Proceeding to deploy');
          "
        env:
          PERF_THRESHOLD: 80

      - name: 📊 Record Score History
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -f report.json ]; then
            SCORE=$(node -e "const r=require('./report.json');console.log(Math.round((r.categories?.performance?.score??0)*100));")
            echo "{\"score\":$SCORE,\"sha\":\"${{ github.sha }}\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" >> scores.json
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add scores.json
            git commit -m "ci: record perf score $SCORE" || echo "No changes"
            git push || echo "Push failed"
          fi

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: performance-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
