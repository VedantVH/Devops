name: 🚦 Performance Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-gate:
    name: Lighthouse Audit + Gate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Tools
        run: npm install -g serve lighthouse

      - name: 🌐 Serve Site
        run: |
          serve . -p 3000 -s &
          sleep 5
          curl -s http://localhost:3000 | head -5
          echo "✅ Server ready at http://localhost:3000"

      - name: 🔦 Run Lighthouse
        run: |
          lighthouse http://localhost:3000 \
            --output=json \
            --output-path=./report.json \
            --chrome-flags="--headless=new --no-sandbox --disable-gpu --disable-dev-shm-usage --disable-setuid-sandbox" \
            --only-categories=performance \
            --throttling-method=provided \
            --skip-audits=uses-http2 \
            --quiet

      - name: 🔍 Verify Report Exists
        if: always()
        run: |
          echo "=== Files in workspace ==="
          ls -la *.json 2>/dev/null || echo "No JSON files found"
          if [ -f report.json ]; then
            echo "✅ report.json found"
            node -e "
              const r = require('./report.json');
              const score = Math.round(r.categories.performance.score * 100);
              console.log('Performance Score:', score);
            "
          else
            echo "❌ report.json NOT found — Lighthouse may have failed"
          fi

      - name: 📎 Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report-${{ github.sha }}
          path: report.json
          retention-days: 30

      - name: 🚦 Performance Gate Check
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('report.json')) {
              console.error('report.json not found!');
              process.exit(1);
            }
            const report = JSON.parse(fs.readFileSync('report.json', 'utf8'));
            const score = Math.round(report.categories.performance.score * 100);
            const threshold = parseInt(process.env.PERF_THRESHOLD || '80');
            console.log('');
            console.log('  =============================================');
            console.log('  LIGHTHOUSE PERFORMANCE GATE');
            console.log('  =============================================');
            console.log('  Score:     ' + score + ' / 100');
            console.log('  Threshold: ' + threshold);
            console.log('  =============================================');
            if (score < threshold) {
              console.error('  GATE FAILED - Deployment BLOCKED');
              console.error('  Score ' + score + ' is below threshold ' + threshold);
              process.exit(1);
            }
            console.log('  GATE PASSED - Proceeding to deploy');
          "
        env:
          PERF_THRESHOLD: 80

      - name: 📊 Record Score History
        if: always() && github.ref == 'refs/heads/main'
        run: |
          if [ -f report.json ]; then
            SCORE=$(node -e "const r=require('./report.json');console.log(Math.round(r.categories.performance.score*100));")
            echo "{\"score\":$SCORE,\"sha\":\"${{ github.sha }}\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" >> scores.json
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add scores.json
            git commit -m "ci: record perf score $SCORE" || echo "No changes"
            git push || echo "Push failed"
          fi

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: performance-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
