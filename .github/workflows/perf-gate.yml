name: 🚦 Performance Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-gate:
    name: Lighthouse Audit + Gate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Lighthouse
        run: npm install -g lighthouse

      - name: 🌐 Serve Site
        run: |
          python3 -m http.server 3000 &
          sleep 4
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" http://localhost:3000/index.html

      - name: 🔦 Run Lighthouse
        run: |
          lighthouse http://localhost:3000/index.html \
            --output=json \
            --output-path=./report.json \
            --chrome-flags="--headless=new --no-sandbox --disable-gpu --disable-dev-shm-usage --disable-setuid-sandbox" \
            --throttling.cpuSlowdownMultiplier=4 \
            --throttling.rttMs=150 \
            --throttling.throughputKbps=1638 \
            --max-wait-for-load=60000

      - name: 🔍 Verify Report
        if: always()
        run: |
          if [ -f report.json ]; then
            echo "✅ report.json found ($(wc -c < report.json) bytes)"
            node -e "
              const r = require('./report.json');
              console.log('URL audited :', r.finalUrl);
              console.log('Runtime error:', r.runtimeError?.message ?? 'none');
              const p = r.categories?.performance?.score;
              console.log('Perf score   :', p, '=> ', Math.round((p??0)*100), '/100');
              console.log('LCP:', r.audits?.['largest-contentful-paint']?.displayValue);
              console.log('TBT:', r.audits?.['total-blocking-time']?.displayValue);
              console.log('CLS:', r.audits?.['cumulative-layout-shift']?.displayValue);
            "
          else
            echo "❌ report.json NOT found"
            ls -la
          fi

      - name: 📎 Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report-${{ github.sha }}
          path: report.json
          retention-days: 30

      - name: 🚦 Performance Gate Check
        run: |
          node -e "
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('report.json', 'utf8'));

            if (report.runtimeError) {
              console.error('Lighthouse error:', report.runtimeError.message);
              process.exit(1);
            }

            const raw = report.categories?.performance?.score;
            const score = Math.round((raw ?? 0) * 100);
            const threshold = parseInt(process.env.PERF_THRESHOLD || '80');

            const lcp = report.audits?.['largest-contentful-paint']?.displayValue ?? 'N/A';
            const tbt = report.audits?.['total-blocking-time']?.displayValue ?? 'N/A';
            const cls = report.audits?.['cumulative-layout-shift']?.displayValue ?? 'N/A';

            console.log('');
            console.log('  =============================================');
            console.log('  LIGHTHOUSE PERFORMANCE GATE');
            console.log('  =============================================');
            console.log('  Score:     ' + score + ' / 100');
            console.log('  Threshold: ' + threshold);
            console.log('  LCP: ' + lcp + '  TBT: ' + tbt + '  CLS: ' + cls);
            console.log('  =============================================');

            if (score < threshold) {
              console.error('  GATE FAILED - Deployment BLOCKED');
              process.exit(1);
            }
            console.log('  GATE PASSED - Proceeding to deploy');
          "
        env:
          PERF_THRESHOLD: 80

      - name: 📊 Record Score History
        if: github.ref == 'refs/heads/main'
        run: |
          SCORE=$(node -e "const r=require('./report.json');console.log(Math.round((r.categories?.performance?.score??0)*100));")
          echo "{\"score\":$SCORE,\"sha\":\"${{ github.sha }}\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" >> scores.json
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add scores.json
          git commit -m "ci: record perf score $SCORE" || echo "No changes"
          git push || echo "Push failed"

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: performance-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
